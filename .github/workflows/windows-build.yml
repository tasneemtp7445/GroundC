name: Windows QGC Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:

  build-windows:

    runs-on: windows-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive


    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
      version: '6.10.3'
      host: windows
      target: desktop
      arch: win64_mingw
      modules: 'qtgraphs qtpositioning qtlocation qtmultimedia qtshadertools'


    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install jinja2


    - name: Configure
  shell: bash
  run: |
    mkdir build
    cd build

    cmake .. \
    -G "MinGW Makefiles" \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_PREFIX_PATH="$Qt6_DIR"


    - name: Build QGroundControl
      shell: bash
      run: |
        cd build
        cmake --build . --config Release -j4


    - name: Package
      shell: bash
      run: |
        cd build
        mkdir package

        windeployqt Release/QGroundControl.exe --qmldir ../src

        cp Release/QGroundControl.exe package/


    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: QGroundControl-Windows
        path: build/package
